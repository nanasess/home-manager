name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix flake check
        run: nix flake check

      - name: Lua syntax check
        run: nix shell nixpkgs#lua -c luac -p modules/wezterm/wezterm.lua

  emacs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: purcell/setup-emacs@master
        with:
          version: release-snapshot
      - uses: actions/cache@v5
        with:
          path: modules/emacs/elpaca/
          key: elpaca-${{ hashFiles('modules/emacs/init.el') }}
          restore-keys: elpaca-
      - name: Emacs batch load test
        run: emacs --init-directory modules/emacs -l modules/emacs/early-init.el -l modules/emacs/init.el --batch

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            config: nanasess@wsl-gentoo
          - os: ubuntu-latest
            config: nanasess@ubuntu
          - os: macos-15-intel
            config: nanasess@macbook

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # Determinate Nix Installer v13+ は Intel Mac 非サポート
      # https://github.com/DeterminateSystems/nix-src/issues/224
      - uses: DeterminateSystems/nix-installer-action@v16
        if: runner.os != 'macOS' || runner.arch != 'X64'

      - uses: DeterminateSystems/nix-installer-action@v12
        if: runner.os == 'macOS' && runner.arch == 'X64'

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build activation package
        run: nix build '.#homeConfigurations."${{ matrix.config }}".activationPackage'
