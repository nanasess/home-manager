# T2 Mac 蓋閉じサスペンド有効化 (/etc/systemd/logind.conf.d/)
#
# 従来サスペンドが壊れていたため HandleLidSwitch=ignore にしていたが、
# apple_bce の system-sleep 回避策 (本モジュール) で suspend が使えるように
# なったため、蓋閉じ → サスペンドを有効化する。
#
# GNOME は蓋閉じ処理を logind に委譲する (gsettings の
# org.gnome.settings-daemon.plugins.power lid-close-*-action=suspend)。
# そのため logind 側が ignore のままだと画面が暗くなるだけで suspend しない。
# ここで logind に suspend を指定することで蓋閉じ → サスペンドが成立する。
#
# 優先順位: 外部モニタ接続 (ドック状態) 時は HandleLidSwitchDocked が優先され、
# ignore なのでサスペンドしない (gsettings lid-close-suspend-with-external-monitor
# =false と挙動が一致)。それ以外は AC/バッテリーとも suspend。
[Login]
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=suspend
HandleLidSwitchDocked=ignore
