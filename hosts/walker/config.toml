# Walker v2.x ユーザー設定 (デフォルトに対する差分のみ記述)
# デフォルト: https://github.com/abenz1267/walker/blob/master/resources/config.toml

[keybinds]
# Emacs 風の C-n / C-p で次/前を選択できるようにする
next = ["Down", "ctrl n"]
previous = ["Up", "ctrl p"]

# C-p の競合解消: provider 固有の `pin`/`unpin` (デフォルトで ctrl p) を unset し
# グローバルな `previous` (C-p) を有効化する。pin 機能は利用しない。
[providers.actions]
desktopapplications = [
  { action = "pin", unset = true },
  { action = "unpin", unset = true },
]
clipboard = [
  { action = "pin", unset = true },
  { action = "unpin", unset = true },
]
